<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions -->
  <defs>
    <!-- Background gradient with Dunhuang colors -->
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#1a1410;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0a08;stop-opacity:1" />
    </radialGradient>
    
    <!-- Golden glow for mystical effect -->
    <radialGradient id="goldenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#B8543E;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0f0a08;stop-opacity:0" />
    </radialGradient>
    
    <!-- Ochre red gradient -->
    <linearGradient id="ochreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B8543E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A64A32;stop-opacity:1" />
    </linearGradient>
    
    <!-- Stone blue gradient -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A7FA5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A6FA5;stop-opacity:1" />
    </linearGradient>
    
    <!-- Inner shadow for depth -->
    <filter id="innerShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Soft glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGradient)" rx="180"/>
  
  <!-- Mystical glow -->
  <circle cx="512" cy="512" r="400" fill="url(#goldenGlow)"/>
  
  <!-- Outer decorative circle with Dunhuang pattern -->
  <circle cx="512" cy="512" r="420" fill="none" stroke="url(#ochreGradient)" stroke-width="2" opacity="0.3"/>
  <circle cx="512" cy="512" r="440" fill="none" stroke="url(#ochreGradient)" stroke-width="1" opacity="0.2"/>
  
  <!-- Eight trigrams positions (Bagua octagon) -->
  <g opacity="0.4" stroke="url(#blueGradient)" stroke-width="2" fill="none">
    <!-- Octagon representing Eight Trigrams -->
    <path d="M 512 132 L 689 236 L 789 413 L 789 611 L 689 788 L 512 892 L 335 788 L 235 611 L 235 413 L 335 236 Z"/>
    
    <!-- Inner octagon -->
    <path d="M 512 182 L 659 266 L 739 443 L 739 581 L 659 758 L 512 842 L 365 758 L 285 581 L 285 443 L 365 266 Z" opacity="0.6"/>
  </g>
  
  <!-- Decorative corner elements (Dunhuang cloud patterns) -->
  <g fill="url(#ochreGradient)" opacity="0.2">
    <!-- Top -->
    <circle cx="512" cy="132" r="8"/>
    <!-- Top-right -->
    <circle cx="689" cy="236" r="6"/>
    <!-- Right -->
    <circle cx="789" cy="413" r="8"/>
    <!-- Bottom-right -->
    <circle cx="789" cy="611" r="6"/>
    <!-- Bottom -->
    <circle cx="512" cy="892" r="8"/>
    <!-- Bottom-left -->
    <circle cx="335" cy="788" r="6"/>
    <!-- Left -->
    <circle cx="235" cy="611" r="8"/>
    <!-- Top-left -->
    <circle cx="235" cy="413" r="6"/>
  </g>
  
  <!-- Central circular frame -->
  <circle cx="512" cy="512" r="320" fill="none" stroke="url(#ochreGradient)" stroke-width="3" opacity="0.5"/>
  <circle cx="512" cy="512" r="315" fill="rgba(212, 167, 116, 0.05)"/>
  
  <!-- Yin-Yang inspired design with mystical elements -->
  <g filter="url(#glow)">
    <!-- Outer ring -->
    <circle cx="512" cy="512" r="240" fill="none" stroke="url(#ochreGradient)" stroke-width="4"/>
    
    <!-- Inner mystical symbol - Stylized Taiji/Lotus fusion -->
    <g opacity="0.9">
      <!-- Left half (Yin) -->
      <path d="M 512 272 A 240 240 0 0 1 512 752 A 120 120 0 0 0 512 512 A 120 120 0 0 1 512 272 Z" 
            fill="url(#ochreGradient)" opacity="0.3"/>
      
      <!-- Right half (Yang) -->
      <path d="M 512 272 A 240 240 0 0 0 512 752 A 120 120 0 0 1 512 512 A 120 120 0 0 0 512 272 Z" 
            fill="url(#blueGradient)" opacity="0.3"/>
      
      <!-- Center dots -->
      <circle cx="512" cy="392" r="30" fill="url(#blueGradient)" opacity="0.6"/>
      <circle cx="512" cy="632" r="30" fill="url(#ochreGradient)" opacity="0.6"/>
      <circle cx="512" cy="392" r="12" fill="#0f0a08" opacity="0.8"/>
      <circle cx="512" cy="632" r="12" fill="#0f0a08" opacity="0.8"/>
    </g>
  </g>
  
  <!-- Central Chinese character 玄 (Mysterious/Mystical) -->
  <text 
    x="512" 
    y="565" 
    font-family="'Noto Serif SC', 'STSong', 'SimSun', serif" 
    font-size="240" 
    font-weight="600"
    fill="url(#ochreGradient)" 
    text-anchor="middle" 
    dominant-baseline="middle"
    opacity="0.85"
    filter="url(#glow)"
  >玄</text>
  
  <!-- Decorative particles around the character -->
  <g fill="url(#ochreGradient)" opacity="0.3">
    <circle cx="380" cy="420" r="3"/>
    <circle cx="420" cy="480" r="2"/>
    <circle cx="360" cy="540" r="3"/>
    <circle cx="400" cy="600" r="2"/>
    
    <circle cx="644" cy="420" r="3"/>
    <circle cx="604" cy="480" r="2"/>
    <circle cx="664" cy="540" r="3"/>
    <circle cx="624" cy="600" r="2"/>
    
    <circle cx="480" cy="360" r="2"/>
    <circle cx="544" cy="360" r="2"/>
    <circle cx="480" cy="664" r="2"/>
    <circle cx="544" cy="664" r="2"/>
  </g>
  
  <!-- Subtle corner decorations (Dunhuang style) -->
  <g stroke="url(#ochreGradient)" stroke-width="2" fill="none" opacity="0.15">
    <!-- Top corners -->
    <path d="M 200 200 Q 150 150 100 200" stroke-linecap="round"/>
    <path d="M 824 200 Q 874 150 924 200" stroke-linecap="round"/>
    
    <!-- Bottom corners -->
    <path d="M 200 824 Q 150 874 100 824" stroke-linecap="round"/>
    <path d="M 824 824 Q 874 874 924 824" stroke-linecap="round"/>
  </g>
  
  <!-- Tiny stars for mystical atmosphere -->
  <g fill="#D4A574" opacity="0.4">
    <circle cx="256" cy="256" r="2"/>
    <circle cx="768" cy="256" r="2"/>
    <circle cx="256" cy="768" r="2"/>
    <circle cx="768" cy="768" r="2"/>
    
    <circle cx="180" cy="512" r="1.5"/>
    <circle cx="844" cy="512" r="1.5"/>
    <circle cx="512" cy="180" r="1.5"/>
    <circle cx="512" cy="844" r="1.5"/>
  </g>
  
  <!-- Center glow point -->
  <circle cx="512" cy="512" r="6" fill="url(#ochreGradient)" opacity="0.8">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
