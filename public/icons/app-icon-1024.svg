<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Luxury Minimalist Fortune App Icon -->
  <defs>
    <!-- Deep luxury black background -->
    <linearGradient id="luxuryBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0a08;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    
    <!-- Pure champagne gold -->
    <linearGradient id="champagneGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9f6f0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8d5b5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af7a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Refined glow -->
    <filter id="refinedGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Pure black background -->
  <rect width="1024" height="1024" fill="url(#luxuryBg)" rx="226"/>
  
  <!-- Main Icon: Single elegant crescent -->
  <g filter="url(#refinedGlow)">
    <path d="M 512 240
             A 260 260 0 0 1 512 784
             A 230 230 0 0 0 512 240 Z" 
          fill="url(#champagneGold)"/>
  </g>
  
  <!-- Minimalist star accent -->
  <g filter="url(#refinedGlow)">
    <circle cx="670" cy="480" r="8" fill="url(#champagneGold)"/>
    <line x1="670" y1="455" x2="670" y2="505" stroke="url(#champagneGold)" stroke-width="1.5" opacity="0.6"/>
    <line x1="645" y1="480" x2="695" y2="480" stroke="url(#champagneGold)" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Pulsing animation -->
  <circle cx="670" cy="480" r="8" fill="#f9f6f0" opacity="0.8">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>