<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern Dunhuang Style App Icon - Clean & Minimal -->
  <defs>
    <!-- Deep Dunhuang gradient background -->
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#2a1f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0a08;stop-opacity:1" />
    </radialGradient>
    
    <!-- Ochre to Gold gradient (Dunhuang colors) -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8B86D;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8543E;stop-opacity:1" />
    </linearGradient>
    
    <!-- Stone blue accent -->
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6A8FAF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5A7FA5;stop-opacity:1" />
    </linearGradient>
    
    <!-- Soft glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Subtle inner glow -->
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0f0a08;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="1024" height="1024" fill="url(#bgGradient)" rx="180"/>
  
  <!-- Subtle inner glow -->
  <circle cx="512" cy="512" r="450" fill="url(#innerGlow)"/>
  
  <!-- Main symbol: Crescent Moon with Star (mystical fortune telling symbol) -->
  <g filter="url(#glow)">
    <!-- Crescent Moon -->
    <path d="M 512 180 
             A 280 280 0 0 1 512 844
             A 240 240 0 0 0 512 180 Z" 
          fill="url(#mainGradient)" 
          opacity="0.95"/>
    
    <!-- Inner crescent detail -->
    <path d="M 532 220 
             A 240 240 0 0 1 532 804
             A 210 210 0 0 0 532 220 Z" 
          fill="none" 
          stroke="url(#blueAccent)" 
          stroke-width="2" 
          opacity="0.4"/>
    
    <!-- Mystical star inside crescent -->
    <g transform="translate(640, 512)">
      <!-- 8-pointed star (Bagua reference) -->
      <path d="M 0 -70 L 15 -20 L 65 -15 L 25 15 L 35 65 L 0 35 L -35 65 L -25 15 L -65 -15 L -15 -20 Z" 
            fill="url(#mainGradient)" 
            opacity="0.9"/>
      <circle cx="0" cy="0" r="16" fill="url(#blueAccent)" opacity="0.7"/>
      <circle cx="0" cy="0" r="6" fill="#0f0a08" opacity="0.9"/>
    </g>
  </g>
  
  <!-- Subtle decorative circles (minimal Dunhuang pattern) -->
  <g opacity="0.15" stroke="url(#mainGradient)" stroke-width="1.5" fill="none">
    <circle cx="512" cy="512" r="420"/>
    <circle cx="512" cy="512" r="440"/>
  </g>
  
  <!-- Four corner accent dots (compass points) -->
  <g fill="url(#blueAccent)" opacity="0.3">
    <circle cx="512" cy="140" r="4"/>
    <circle cx="884" cy="512" r="4"/>
    <circle cx="512" cy="884" r="4"/>
    <circle cx="140" cy="512" r="4"/>
  </g>
  
  <!-- Tiny mystical particles -->
  <g fill="url(#mainGradient)" opacity="0.25">
    <circle cx="320" cy="280" r="2.5"/>
    <circle cx="704" cy="280" r="2"/>
    <circle cx="280" cy="512" r="2.5"/>
    <circle cx="280" cy="704" r="2"/>
    <circle cx="704" cy="744" r="2.5"/>
  </g>
  
  <!-- Central glow point with pulse animation -->
  <circle cx="640" cy="512" r="5" fill="url(#mainGradient)" opacity="0.9">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;6;4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>