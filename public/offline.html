<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Mystic Arts</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
      background: linear-gradient(to bottom right, #1a1510, #0f0a08, #1a0f0a);
      color: #D4A76A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 500px;
      border: 2px solid rgba(212, 167, 106, 0.3);
      padding: 60px 40px;
      position: relative;
      background: rgba(15, 10, 8, 0.5);
      backdrop-filter: blur(10px);
    }
    
    .corner {
      position: absolute;
      width: 20px;
      height: 20px;
    }
    
    .corner-tl {
      top: 0;
      left: 0;
      border-left: 2px solid rgba(212, 167, 106, 0.6);
      border-top: 2px solid rgba(212, 167, 106, 0.6);
    }
    
    .corner-tr {
      top: 0;
      right: 0;
      border-right: 2px solid rgba(212, 167, 106, 0.6);
      border-top: 2px solid rgba(212, 167, 106, 0.6);
    }
    
    .corner-bl {
      bottom: 0;
      left: 0;
      border-left: 2px solid rgba(212, 167, 106, 0.6);
      border-bottom: 2px solid rgba(212, 167, 106, 0.6);
    }
    
    .corner-br {
      bottom: 0;
      right: 0;
      border-right: 2px solid rgba(212, 167, 106, 0.6);
      border-bottom: 2px solid rgba(212, 167, 106, 0.6);
    }
    
    h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      margin-bottom: 1rem;
      opacity: 0.9;
    }
    
    .chinese {
      font-size: 1.2rem;
      opacity: 0.7;
      margin-bottom: 2rem;
      letter-spacing: 0.2em;
    }
    
    p {
      font-size: 1rem;
      line-height: 1.8;
      opacity: 0.8;
      margin-bottom: 2rem;
    }
    
    .retry-btn {
      display: inline-block;
      border: 1px solid rgba(212, 167, 106, 0.5);
      padding: 12px 32px;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      color: #D4A76A;
      text-decoration: none;
      background: rgba(212, 167, 106, 0.1);
      transition: all 0.3s ease;
      cursor: pointer;
      font-family: inherit;
    }
    
    .retry-btn:hover {
      background: rgba(212, 167, 106, 0.2);
      border-color: rgba(212, 167, 106, 0.8);
    }
    
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    
    <svg class="icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="40" stroke="#D4A76A" stroke-width="1" opacity="0.3"/>
      <path d="M50 20 L50 80 M20 50 L80 50" stroke="#D4A76A" stroke-width="1" opacity="0.5"/>
      <circle cx="50" cy="50" r="5" fill="#D4A76A" opacity="0.6"/>
    </svg>
    
    <h1>OFFLINE</h1>
    <p class="chinese">無網絡連接</p>
    <p>
      You are currently offline.<br>
      Please check your internet connection<br>
      and try again.
    </p>
    <button class="retry-btn" onclick="window.location.reload()">
      RETRY CONNECTION
    </button>
  </div>
</body>
</html>
